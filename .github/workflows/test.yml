name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # The songbook-viewer submodule is private and not needed for the
      # Python tests, so we deliberately do not check out submodules.
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run coverage run -m pytest -q

      # Fails if coverage drops below the fail_under threshold in .coveragerc.
      - name: Coverage report
        run: uv run coverage report

      - name: Lint
        run: uv run ruff check .
